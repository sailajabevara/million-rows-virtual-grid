<!DOCTYPE html>
<html>

<head>
<title>Million Rows Grid</title>

<style>

body{
font-family:Arial;
margin:20px;
}

/* SCROLL CONTAINER */
#container{
height:600px;
overflow:auto;
border:1px solid black;
position:relative;
}

/* FORCE HORIZONTAL SCROLL */
#window,.header{
width:max-content;
}

#sizer{
position:absolute;
width:100%;
}

#window{
position:absolute;
}

.row{
height:40px;
border-bottom:1px solid #ddd;
display:flex;
cursor:pointer;
}

/* Selected row */
.row[data-selected="true"]{
background:#cce5ff;
}

.cell{
min-width:200px;
padding:5px;
border-right:1px solid #eee;
white-space:nowrap;
flex-shrink:0;
}

/* HEADER */
.header{
display:flex;
font-weight:bold;
border-bottom:2px solid black;
background:#eee;
}

/* PINNED COLUMN */
.pinned-column{
position:sticky;
left:0;
background:white;
z-index:3;
}

/* FILTER */
.filterBox{
margin-bottom:10px;
}

/* DEBUG PANEL */
.debug{
position:fixed;
top:10px;
right:10px;
background:white;
border:1px solid black;
padding:10px;
}

</style>
</head>

<body>

<h2>Million Rows Virtual Grid</h2>

<div class="filterBox">

<input
placeholder="Search Merchant"
data-test-id="filter-merchant">

<br><br>

<div data-test-id="filter-count">
Showing 1000000 of 1000000 rows
</div>

<br>

<button data-test-id="quick-filter-Completed">Completed</button>
<button data-test-id="quick-filter-Pending">Pending</button>
<button id="resetFilter">Reset</button>

</div>


<!-- HEADERS -->
<div class="header">

<div class="cell"
data-test-id="header-id">
ID
<button data-test-id="pin-column-id">📌</button>
</div>

<div class="cell"
data-test-id="header-date">
Date
</div>

<div class="cell">
Merchant
</div>

<div class="cell"
data-test-id="header-amount"
style="cursor:pointer">
Amount
</div>

<div class="cell">
Status
</div>

</div>


<!-- GRID -->
<div data-test-id="grid-scroll-container" id="container">
<div id="sizer"></div>
<div data-test-id="grid-row-window" id="window"></div>
</div>


<!-- DEBUG PANEL -->
<div class="debug" data-test-id="debug-panel">

FPS:
<div data-test-id="debug-fps"></div>

<br>

Rows Rendered:
<div data-test-id="debug-rendered-rows"></div>

<br>

Scroll Position:
<div data-test-id="debug-scroll-position"></div>

</div>

<script src="app.js"></script>

</body>
</html>
