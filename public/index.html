<!DOCTYPE html>
<html>

<head>

<title>Million Rows Grid</title>

<style>

body{
font-family:Arial;
margin:20px;
}

#container{

height:600px;

overflow-y:scroll;

border:1px solid black;

position:relative;

}

#sizer{

position:absolute;

width:100%;

}

#window{

position:absolute;

width:100%;

}

.row{

height:40px;

border-bottom:1px solid #ddd;

display:flex;

}

.cell{

flex:1;
padding:5px;

}

.debug{

position:fixed;

top:10px;
right:10px;

background:white;

border:1px solid black;

padding:10px;

}

</style>

</head>

<body>

<h2>Million Rows Virtual Grid</h2>


<div
data-test-id="grid-scroll-container"
id="container">


<div id="sizer"></div>


<div
data-test-id="grid-row-window"
id="window">

</div>

</div>



<div
class="debug"
data-test-id="debug-panel">

FPS:

<div data-test-id="debug-fps"></div>

Rows Rendered:

<div data-test-id="debug-rendered-rows"></div>

Scroll Position:

<div data-test-id="debug-scroll-position"></div>

</div>



<script src="app.js"></script>

</body>

</html>
